version: '3.9'
services:
  app:
    build: .
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - TWITCH_CLIENT_ID=h0zgudvlf56ii2q4wpusij14t7dh3j
      - TWITCH_CLIENT_SECRET=qs9jbcscqxmafrjl03vimllcnjljbb
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
